name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check dqk/ --select E,F,W,I --ignore E501

      - name: Type check (mypy)
        run: mypy dqk/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # non-blocking for now

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=dqk --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python${{ matrix.python-version }}
        continue-on-error: true

  quality-gate:
    name: Quality Gate (dqk check on example data)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e .
      - name: Run DQK on example CSV
        run: dqk check examples/sample.csv --fail-under 50
